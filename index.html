<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Teste - Avaliação de Chamados</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body>

  <div class="container">

    <h2>Registro de Chamados - TESTE</h2>

    <label>Número do Chamado</label>
    <input type="text" id="chamado" placeholder="Ex: 12345">

    <label>Nome do Técnico</label>
    <input type="text" id="tecnico" placeholder="Ex: João Silva">

    <label>Data da Conclusão</label>
    <input type="date" id="data">

    <label>Hora da Conclusão</label>
    <input type="time" id="hora">

    <button onclick="enviarTeste()">Enviar Teste</button>

    <p id="status"></p>

  </div>

  <script src="app.js"></script>

  <script>
    // preencher data e hora automática
    window.onload = function () {
      let agora = new Date();

      document.getElementById("data").value = agora.toISOString().split("T")[0];

      document.getElementById("hora").value =
        agora.getHours().toString().padStart(2, '0') + ":" +
        agora.getMinutes().toString().padStart(2, '0');
    }

    function enviarTeste() {

      const dados = {
        chamado: document.getElementById("chamado").value,
        tecnico: document.getElementById("tecnico").value,
        dataConclusao: document.getElementById("data").value,
        horaConclusao: document.getElementById("hora").value,
        nota: 5,
        comentario: "Teste automático do sistema"
      };

      fetch("https://script.google.com/macros/s/AKfycby9NyvrwB6FTjGN_n6Y9z8Ig56mdaG0HKgvDdyMNDpmZIZWu93rm-5T-kx30hJq_VYVZA/exec", {
        method: "POST",
        body: JSON.stringify(dados)
      })
      .then(r => r.text())
      .then(res => {
        document.getElementById("status").innerText = "✔ Enviado com sucesso: " + res;
        console.log(res);
      })
      .catch(err => {
        document.getElementById("status").innerText = "❌ Erro ao enviar";
        console.error(err);
      });

    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Engenharia Clínica - Avaliação</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="container">

  <!-- 🏥 CHAMADO -->
  <div id="tela1" class="tela ativa">

    <div class="card">
      <h2>Concluir Chamado</h2>

      <input id="chamado" placeholder="Número do chamado">
      <input id="tecnico" placeholder="Nome do técnico">

      <label>Data conclusão</label>
      <input type="date" id="data">

      <label>Hora conclusão</label>
      <input type="time" id="hora">

      <button onclick="irAvaliacao()">Continuar para avaliação</button>
    </div>

  </div>

  <!-- ⭐ AVALIAÇÃO -->
  <div id="tela2" class="tela">

    <div class="card">

      <h2>Avaliação do Atendimento</h2>

      <div class="info" id="infoChamado"></div>

      <div class="estrelas">
        <span onclick="nota(1)">★</span>
        <span onclick="nota(2)">★</span>
        <span onclick="nota(3)">★</span>
        <span onclick="nota(4)">★</span>
        <span onclick="nota(5)">★</span>
      </div>

      <textarea id="comentario" placeholder="Comentário (opcional)"></textarea>

      <button onclick="enviar()">Enviar avaliação</button>

    </div>

  </div>

  <!-- 📡 PENDÊNCIAS -->
  <div id="tela3" class="tela">

    <div class="card">

      <h2>Pendências Offline</h2>

      <div id="listaPendencias"></div>

      <button onclick="sincronizar()">Sincronizar dados</button>

    </div>

  </div>

</div>

<!-- MENU -->
<div class="menu">

  <button onclick="abrir('tela1')" id="m1" class="ativo">🏥 Chamado</button>
  <button onclick="abrir('tela2')" id="m2">⭐ Avaliação</button>
  <button onclick="abrir('tela3')" id="m3">📡 Pendências</button>

</div>

<script>
let notaSelecionada = 0;

const API = "https://script.google.com/macros/s/AKfycby9NyvrwB6FTjGN_n6Y9z8Ig56mdaG0HKgvDdyMNDpmZIZWu93rm-5T-kx30hJq_VYVZA/exec";

window.onload = () => {
  let agora = new Date();

  document.getElementById("data").value = agora.toISOString().split("T")[0];
  document.getElementById("hora").value =
    agora.getHours().toString().padStart(2,'0') + ":" +
    agora.getMinutes().toString().padStart(2,'0');
};

function abrir(tela) {

  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");

  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("ativo"));

  if (tela === "tela1") document.getElementById("m1").classList.add("ativo");
  if (tela === "tela2") document.getElementById("m2").classList.add("ativo");
  if (tela === "tela3") {
    document.getElementById("m3").classList.add("ativo");
    mostrarPendencias();
  }
}

function irAvaliacao() {
  abrir("tela2");

  document.getElementById("infoChamado").innerHTML =
    "Chamado: <b>" + document.getElementById("chamado").value + "</b><br>" +
    "Técnico: <b>" + document.getElementById("tecnico").value + "</b>";
}

function nota(n) {
  notaSelecionada = n;

  document.querySelectorAll(".estrelas span").forEach((e,i)=>{
    e.classList.toggle("ativa", i < n);
  });
}

function enviar() {

  const dados = {
    chamado: document.getElementById("chamado").value,
    tecnico: document.getElementById("tecnico").value,
    data: document.getElementById("data").value,
    hora: document.getElementById("hora").value,
    nota: notaSelecionada,
    comentario: document.getElementById("comentario").value
  };

  if (!navigator.onLine) {
    salvar(dados);
    alert("Sem internet. Salvo em pendências.");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(()=>alert("Avaliação enviada"))
  .catch(()=>salvar(dados));
}

function salvar(dados){
  let lista = JSON.parse(localStorage.getItem("pend")) || [];
  lista.push(dados);
  localStorage.setItem("pend", JSON.stringify(lista));
}

function mostrarPendencias(){

  let lista = JSON.parse(localStorage.getItem("pend")) || [];

  document.getElementById("listaPendencias").innerHTML =
    lista.length ? lista.map(p=>`
      <div class="item">
        <b>Chamado:</b> ${p.chamado}<br>
        <b>Técnico:</b> ${p.tecnico}<br>
        <b>Nota:</b> ${p.nota}
      </div>
    `).join("") : "<p>Nenhuma pendência</p>";
}

function sincronizar(){

  let lista = JSON.parse(localStorage.getItem("pend")) || [];

  lista.forEach(d=>{
    fetch(API,{method:"POST",body:JSON.stringify(d)});
  });

  localStorage.removeItem("pend");
  mostrarPendencias();
}
</script>

</body>
</html>

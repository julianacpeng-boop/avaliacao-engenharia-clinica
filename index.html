<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Avaliação Engenharia Clínica</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- TELA 1 -->
  <div class="tela ativa" id="tela1">
    <h2>Registro do Chamado</h2>

    <input id="chamado" placeholder="Número do chamado">
    <input id="tecnico" placeholder="Nome do técnico">
    <input id="data" type="date">
    <input id="hora" type="time">

    <button onclick="irTela2()">Avançar</button>
  </div>

  <!-- TELA 2 -->
  <div class="tela" id="tela2">
    <h2>Ações</h2>

    <button onclick="gerarQR()">Gerar QR Code</button>
    <button onclick="irTela4()">Avaliação Direta</button>
  </div>

  <!-- TELA 3 -->
  <div class="tela" id="tela3">
    <h2>QR Code</h2>

    <div id="qrcode"></div>

    <button onclick="irTela1()">Voltar</button>
  </div>

  <!-- TELA 4 -->
  <div class="tela" id="tela4">
    <h2>Avaliação</h2>

    <input id="nota" placeholder="Nota (0-5)">
    <input id="comentario" placeholder="Comentário">

    <button onclick="enviar()">Enviar Avaliação</button>
  </div>

  <!-- TELA 5 -->
  <div class="tela" id="tela5">
    <h2>Pendências</h2>

    <div id="pendencias"></div>

    <button onclick="sincronizar()">Enviar Pendências</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>

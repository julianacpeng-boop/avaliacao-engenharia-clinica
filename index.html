<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>App Avaliação de Chamados</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="container">

  <!-- 🏠 TELA PRINCIPAL -->
  <div id="tela1" class="tela ativa">

    <h2>Concluir Chamado</h2>

    <input id="chamado" placeholder="Número do chamado">
    <input id="tecnico" placeholder="Nome do técnico">

    <label>Data</label>
    <input type="date" id="data">

    <label>Hora</label>
    <input type="time" id="hora">

    <button onclick="irParaAvaliacao()">Continuar</button>

    <hr style="margin:15px 0;">

    <h3>Avaliação rápida</h3>

    <div>
      <span class="estrela" onclick="nota(1)">★</span>
      <span class="estrela" onclick="nota(2)">★</span>
      <span class="estrela" onclick="nota(3)">★</span>
      <span class="estrela" onclick="nota(4)">★</span>
      <span class="estrela" onclick="nota(5)">★</span>
    </div>

    <textarea id="comentario" placeholder="Comentário (opcional)"></textarea>

    <button onclick="enviar()">Enviar Avaliação</button>

  </div>

  <!-- 📡 TELA PENDÊNCIAS -->
  <div id="tela5" class="tela">

    <h2>Pendências de Envio</h2>

    <div id="listaPendencias"></div>

    <button onclick="sincronizar()">Sincronizar Agora</button>

  </div>

</div>

<!-- 🔻 MENU INFERIOR -->
<div class="menu">

  <button onclick="abrirTela('tela1')" id="btnHome" class="ativo">
    🏠 Principal
  </button>

  <button onclick="abrirTela('tela5')" id="btnPend">
    📡 Pendências
  </button>

</div>

<script>
let notaSelecionada = 0;

const API_URL = "https://script.google.com/macros/s/AKfycby9NyvrwB6FTjGN_n6Y9z8Ig56mdaG0HKgvDdyMNDpmZIZWu93rm-5T-kx30hJq_VYVZA/exec";

// 📅 automático
window.onload = function () {

  let agora = new Date();

  document.getElementById("data").value =
    agora.toISOString().split("T")[0];

  document.getElementById("hora").value =
    agora.getHours().toString().padStart(2,'0') + ":" +
    agora.getMinutes().toString().padStart(2,'0');
}

// 📱 navegação
function abrirTela(tela) {

  document.querySelectorAll(".tela")
    .forEach(t => t.classList.remove("ativa"));

  document.getElementById(tela).classList.add("ativa");

  document.querySelectorAll(".menu button")
    .forEach(b => b.classList.remove("ativo"));

  if (tela === "tela1") document.getElementById("btnHome").classList.add("ativo");
  if (tela === "tela5") document.getElementById("btnPend").classList.add("ativo");

  if (tela === "tela5") mostrarPendencias();
}

// ⭐ estrelas
function nota(n) {
  notaSelecionada = n;

  document.querySelectorAll(".estrela").forEach((e, i) => {
    e.classList.toggle("ativa", i < n);
  });
}

// 📡 enviar
function enviar() {

  const dados = {
    chamado: document.getElementById("chamado").value,
    tecnico: document.getElementById("tecnico").value,
    dataConclusao: document.getElementById("data").value,
    horaConclusao: document.getElementById("hora").value,
    nota: notaSelecionada,
    comentario: document.getElementById("comentario").value
  };

  if (!navigator.onLine) {
    salvarPendente(dados);
    alert("Sem internet. Salvo em pendências.");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(() => alert("Avaliação enviada"))
  .catch(() => salvarPendente(dados));
}

// 💾 offline
function salvarPendente(dados) {
  let lista = JSON.parse(localStorage.getItem("pendencias")) || [];
  lista.push(dados);
  localStorage.setItem("pendencias", JSON.stringify(lista));
}

// 📡 mostrar pendências
function mostrarPendencias() {

  let lista = JSON.parse(localStorage.getItem("pendencias")) || [];

  document.getElementById("listaPendencias").innerHTML =
    lista.length === 0
      ? "<p>Nenhuma pendência</p>"
      : lista.map(p => `
          <div class="pendencia">
            <b>Chamado:</b> ${p.chamado}<br>
            <b>Técnico:</b> ${p.tecnico}<br>
            <b>Nota:</b> ${p.nota}
          </div>
        `).join("");
}

// 🔄 sincronizar
function sincronizar() {

  let lista = JSON.parse(localStorage.getItem("pendencias")) || [];

  if (lista.length === 0) {
    alert("Nada para sincronizar");
    return;
  }

  lista.forEach((dados, i) => {
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(dados)
    }).then(() => {
      lista.splice(i, 1);
      localStorage.setItem("pendencias", JSON.stringify(lista));
      mostrarPendencias();
    });
  });
}

// avaliação direta
function irParaAvaliacao() {
  alert("Preencha e envie a avaliação abaixo.");
}
</script>

</body>
</html>

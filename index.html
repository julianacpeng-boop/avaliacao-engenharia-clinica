<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>App Avaliação de Chamados</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- 🔵 TELA 1 - REGISTRO -->
  <div id="tela1" class="tela ativa">
    <h2>Registro do Chamado</h2>

    <input id="chamado" placeholder="Número do chamado">
    <input id="tecnico" placeholder="Nome do técnico">

    <label>Data</label>
    <input type="date" id="data">

    <label>Hora</label>
    <input type="time" id="hora">

    <button onclick="irParaOpcoes()">Concluir Atendimento</button>
  </div>

  <!-- 🟡 TELA 2 - OPÇÕES -->
  <div id="tela2" class="tela">
    <h2>Opções</h2>

    <button onclick="irParaAvaliacao()">Abrir Avaliação</button>
    <button onclick="verPendencias()">Ver Pendências</button>
    <button onclick="gerarQR()">Gerar QR Code</button>

    <p id="qr"></p>
  </div>

  <!-- ⭐ TELA 3 - AVALIAÇÃO -->
  <div id="tela3" class="tela">
    <h2>Avaliação do Atendimento</h2>

    <p id="infoChamado"></p>

    <div>
      <span class="estrela" onclick="nota(1)">★</span>
      <span class="estrela" onclick="nota(2)">★</span>
      <span class="estrela" onclick="nota(3)">★</span>
      <span class="estrela" onclick="nota(4)">★</span>
      <span class="estrela" onclick="nota(5)">★</span>
    </div>

    <textarea id="comentario" placeholder="Comentário (opcional)"></textarea>

    <button onclick="enviar()">Enviar Avaliação</button>
  </div>

  <!-- 🟢 TELA 4 - CONFIRMAÇÃO -->
  <div id="tela4" class="tela">
    <h2>✔ Avaliação enviada!</h2>
    <p>Obrigado pelo feedback.</p>

    <button onclick="reiniciar()">Novo chamado</button>
  </div>

  <!-- 🔴 TELA 5 - PENDÊNCIAS -->
  <div id="tela5" class="tela">
    <h2>📡 Pendências de Envio</h2>

    <div id="listaPendencias"></div>

    <button onclick="sincronizar()">Sincronizar Agora</button>
    <button onclick="voltar()">Voltar</button>
  </div>

</div>

<script src="app.js"></script>

<script>
let notaSelecionada = 0;

const API_URL = "https://script.google.com/macros/s/AKfycby9NyvrwB6FTjGN_n6Y9z8Ig56mdaG0HKgvDdyMNDpmZIZWu93rm-5T-kx30hJq_VYVZA/exec";

// 📅 data/hora automática
window.onload = function () {
  let agora = new Date();

  document.getElementById("data").value = agora.toISOString().split("T")[0];

  document.getElementById("hora").value =
    agora.getHours().toString().padStart(2,'0') + ":" +
    agora.getMinutes().toString().padStart(2,'0');

  sincronizarAutomatico();
}

// 📌 controle de telas
function mostrar(tela) {
  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");
}

function irParaOpcoes() {
  mostrar("tela2");
}

function irParaAvaliacao() {
  mostrar("tela3");

  document.getElementById("infoChamado").innerText =
    "Chamado: " + document.getElementById("chamado").value +
    " | Técnico: " + document.getElementById("tecnico").value;
}

// ⭐ estrelas
function nota(n) {
  notaSelecionada = n;

  let estrelas = document.querySelectorAll(".estrela");
  estrelas.forEach((e, i) => {
    e.classList.toggle("ativa", i < n);
  });
}

// 📡 ENVIAR
function enviar() {

  const dados = {
    chamado: document.getElementById("chamado").value,
    tecnico: document.getElementById("tecnico").value,
    dataConclusao: document.getElementById("data").value,
    horaConclusao: document.getElementById("hora").value,
    nota: notaSelecionada,
    comentario: document.getElementById("comentario").value
  };

  // ❌ SEM INTERNET → salva pendente
  if (!navigator.onLine) {
    salvarPendente(dados);
    mostrar("tela4");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(r => r.text())
  .then(res => {
    console.log(res);
    mostrar("tela4");
  })
  .catch(err => {
    salvarPendente(dados);
    mostrar("tela4");
  });
}

// 💾 salvar offline
function salvarPendente(dados) {
  let lista = JSON.parse(localStorage.getItem("pendencias")) || [];
  lista.push(dados);
  localStorage.setItem("pendencias", JSON.stringify(lista));
}

// 📡 ver pendências
function verPendencias() {
  mostrar("tela5");

  let lista = JSON.parse(localStorage.getItem("pendencias")) || [];

  document.getElementById("listaPendencias").innerHTML =
    lista.length === 0
      ? "<p>Nenhuma pendência</p>"
      : lista.map(p => `
          <div class="pendencia">
            <b>Chamado:</b> ${p.chamado}<br>
            <b>Técnico:</b> ${p.tecnico}<br>
            <b>Nota:</b> ${p.nota}
          </div>
        `).join("");
}

// 🔄 sincronizar
function sincronizar() {
  let lista = JSON.parse(localStorage.getItem("pendencias")) || [];

  if (lista.length === 0) {
    alert("Nada para sincronizar");
    return;
  }

  lista.forEach((dados, index) => {
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(dados)
    })
    .then(() => {
      lista.splice(index, 1);
      localStorage.setItem("pendencias", JSON.stringify(lista));
      verPendencias();
    });
  });
}

// 🔄 automático
function sincronizarAutomatico() {
  if (navigator.onLine) {
    sincronizar();
  }
}

function voltar() {
  mostrar("tela2");
}

// 🔄 reiniciar
function reiniciar() {
  location.reload();
}

// 📷 QR simples (depois melhoramos)
function gerarQR() {
  const url =
    window.location.href +
    "?chamado=" + document.getElementById("chamado").value +
    "&tec=" + document.getElementById("tecnico").value;

  document.getElementById("qr").innerText = url;
}
</script>

</body>
</html>

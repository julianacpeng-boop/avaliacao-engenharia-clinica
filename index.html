<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Avaliação Engenharia Clínica</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- MENU -->
  <div class="menu">
    <button onclick="mostrar('tela1')">Chamado</button>
    <button onclick="mostrar('tela5')">Pendências</button>
  </div>

  <!-- TELA 1 - CHAMADO -->
  <div class="tela ativa" id="tela1">

    <h2>Registro do Chamado</h2>

    <input id="chamado" placeholder="Número do chamado">
    <input id="tecnico" placeholder="Nome do técnico">

    <input id="data" type="date">
    <input id="hora" type="time">

    <button onclick="concluirChamado()">Concluir</button>

  </div>

  <!-- TELA 2 - AÇÕES -->
  <div class="tela" id="tela2">

    <h2>Ações</h2>

    <button onclick="mostrar('tela4')">Avaliar no Tablet</button>
    <button onclick="gerarQR()">Gerar QR Code</button>

  </div>

  <!-- TELA 3 - QR CODE -->
  <div class="tela" id="tela3">

    <h2>QR Code do Chamado</h2>

    <div id="qrcode"></div>

    <button onclick="mostrar('tela1')">Novo Chamado</button>

  </div>

  <!-- TELA 4 - AVALIAÇÃO -->
  <div class="tela" id="tela4">

    <h2>Avaliação</h2>

    <input id="nota" type="number" min="1" max="5" placeholder="Nota (1 a 5)">
    <input id="comentario" placeholder="Comentário (opcional)">

    <button onclick="enviarAvaliacao()">Enviar Avaliação</button>

  </div>

  <!-- TELA 5 - PENDÊNCIAS -->
  <div class="tela" id="tela5">

    <h2>Pendências Offline</h2>

    <div id="pendencias"></div>

    <button onclick="sincronizar()">Enviar Tudo</button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>

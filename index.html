<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Engenharia Clínica - Avaliação</title>
  
</head>
  <style>
   /* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", system-ui, Arial;
}

/* ===== FUNDO PROFISSIONAL ===== */
body {
  background: #eef2f7;
  color: #0f172a;
}

/* ===== CONTAINER LIMPO ===== */
.container {
  width: 100%;
  min-height: 100vh;
  padding: 18px;
  padding-bottom: 90px;
}

/* ===== TÍTULOS MAIS FORTES ===== */
h2 {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 14px;
  color: #0f172a;
}

/* ===== CARD PREMIUM ===== */
.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;

  border: 1px solid #e5e7eb;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
}

/* ===== INPUTS ESTILO SISTEMA ===== */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 10px;

  border-radius: 12px;
  border: 1px solid #dbe2ea;

  font-size: 15px;
  outline: none;
  background: #fff;
}

input:focus, textarea:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

textarea {
  min-height: 90px;
}

/* ===== BOTÃO PROFISSIONAL ===== */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;

  border: none;
  border-radius: 12px;

  background: #2563eb;
  color: white;

  font-size: 15px;
  font-weight: 600;

  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

button:active {
  transform: scale(0.98);
}

/* ===== ESTRELAS MAIS PROFISSIONAIS ===== */
.estrelas {
  display: flex;
  justify-content: center;
  gap: 8px;
  font-size: 32px;
  margin: 14px 0;
}

.estrelas span {
  color: #cbd5e1;
  cursor: pointer;
  transition: 0.2s;
}

.estrelas span.ativa {
  color: #fbbf24;
}

/* ===== RESUMO ===== */
.card-resumo {
  background: #f8fafc;
  border-radius: 14px;
  padding: 14px;
  border: 1px solid #e5e7eb;
  margin-bottom: 16px;
}

.card-resumo h3 {
  font-size: 15px;
  margin-bottom: 10px;
  color: #1e293b;
}

.resumo-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 14px;
  border-bottom: 1px solid #eaeef3;
}

.resumo-item:last-child {
  border-bottom: none;
}

.resumo-item span {
  color: #64748b;
}

/* ===== PENDÊNCIAS (IMPORTANTE) ===== */
.item {
  background: #ffffff;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 10px;

  border-left: 4px solid #f59e0b;
  box-shadow: 0 6px 14px rgba(0,0,0,0.04);
  font-size: 13px;
}

/* ===== MENU PROFISSIONAL ===== */
.menu {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 64px;

  background: #ffffff;
  display: flex;

  border-top: 1px solid #e5e7eb;
  box-shadow: 0 -6px 20px rgba(0,0,0,0.06);
}

.menu button {
  flex: 1;
  border: none;
  background: none;

  font-size: 13px;
  color: #64748b;
}

.menu button.ativo {
  color: #2563eb;
  font-weight: 700;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);

  background: #0f172a;
  color: white;

  padding: 12px 16px;
  border-radius: 10px;

  font-size: 13px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
  </style>

<body>

<div class="container">

  <!-- 🏥 TELA 1 - CHAMADO -->
  <div id="tela1" class="tela ativa">

    <div class="card">
      <h2>Concluir Chamado</h2>

      <input id="chamado" placeholder="Número do chamado">
      <input id="tecnico" placeholder="Nome do técnico">

      <label>Data</label>
      <input type="date" id="data">

      <label>Hora</label>
      <input type="time" id="hora">

      <button onclick="irOpcoes()">Concluir atendimento</button>
    </div>

  </div>

  <!-- 📌 TELA 2 - OPÇÕES -->
  <div id="tela2" class="tela">

    <div class="card">

      <h2>Como deseja avaliar?</h2>

      <button onclick="avaliarTablet()">⭐ Avaliar no tablet</button>
      <button onclick="gerarQR()">📷 Gerar QR Code</button>

      <p id="qr"></p>

    </div>

  </div>

  <!-- ⭐ TELA 3 - AVALIAÇÃO -->
  <div id="tela3" class="tela">

    <div class="card">

      <h2>Avaliação</h2>

  <div class="card-resumo">

  <h3>Resumo do Atendimento</h3>

  <div id="resumoChamado"></div>

</div>

      <div class="estrelas">
        <span onclick="nota(1)">★</span>
        <span onclick="nota(2)">★</span>
        <span onclick="nota(3)">★</span>
        <span onclick="nota(4)">★</span>
        <span onclick="nota(5)">★</span>
      </div>

      <textarea id="comentario" placeholder="Comentário (opcional)"></textarea>

      <button onclick="enviar()">Enviar avaliação</button>

    </div>

  </div>

  <!-- 📡 PENDÊNCIAS -->
  <div id="tela4" class="tela">

    <div class="card">

      <h2>Pendências</h2>

      <div id="listaPendencias"></div>

      <button onclick="sincronizar()">Sincronizar</button>

    </div>

  </div>

</div>

<!-- MENU -->
<div class="menu">

  <button onclick="abrir('tela1')" class="ativo">🏥</button>
  <button onclick="abrir('tela4')">📡</button>

</div>

<script>
let notaSelecionada = 0;
let chamadoFinal = {};

const API = "https://script.google.com/macros/s/AKfycby9NyvrwB6FTjGN_n6Y9z8Ig56mdaG0HKgvDdyMNDpmZIZWu93rm-5T-kx30hJq_VYVZA/exec";

window.onload = () => {
  let agora = new Date();
  carregarPendencias();
  document.getElementById("data").value = agora.toISOString().split("T")[0];
  document.getElementById("hora").value =
    agora.getHours().toString().padStart(2,'0') + ":" +
    agora.getMinutes().toString().padStart(2,'0');
};

/* 🔁 navegação base */
function abrir(tela){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");
}

/* ➡️ fluxo correto */
function irOpcoes(){

  chamadoFinal = {
    chamado: document.getElementById("chamado").value,
    tecnico: document.getElementById("tecnico").value,
    data: document.getElementById("data").value,
    hora: document.getElementById("hora").value
  };

  abrir("tela2");
}

/* ⭐ avaliar no tablet */
function avaliarTablet(){
  abrir("tela3");

  const chamado = document.getElementById("chamado").value;
  const tecnico = document.getElementById("tecnico").value;
  const data = document.getElementById("data").value;
  const hora = document.getElementById("hora").value;

  document.getElementById("resumoChamado").innerHTML = `
    
    <div class="resumo-item">
      <span>📄 Chamado:</span>
      <b>${chamado}</b>
    </div>

    <div class="resumo-item">
      <span>👨‍🔧 Técnico:</span>
      <b>${tecnico}</b>
    </div>

    <div class="resumo-item">
      <span>📅 Data:</span>
      <b>${data}</b>
    </div>

    <div class="resumo-item">
      <span>⏰ Hora:</span>
      <b>${hora}</b>
    </div>

  `;
}

/* 📷 QR CODE (simples por enquanto) */
function gerarQR(){

  const chamado = document.getElementById("chamado").value;
  const tecnico = document.getElementById("tecnico").value;
  const data = document.getElementById("data").value;
  const hora = document.getElementById("hora").value;

  const baseURL = "https://script.google.com/macros/s/AKfycby9NyvrwB6FTjGN_n6Y9z8Ig56mdaG0HKgvDdyMNDpmZIZWu93rm-5T-kx30hJq_VYVZA/exec";

  const url =
    baseURL +
    "?chamado=" + encodeURIComponent(chamado) +
    "&tecnico=" + encodeURIComponent(tecnico) +
    "&data=" + encodeURIComponent(data) +
    "&hora=" + encodeURIComponent(hora);

  const qrImg =
    "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
    encodeURIComponent(url);

  document.getElementById("qr").innerHTML =
    `<img src="${qrImg}" style="width:220px;height:220px;margin-top:10px;">`;

}

/* ⭐ estrelas */
function nota(n){
  notaSelecionada = n;

  document.querySelectorAll(".estrelas span")
    .forEach((e,i)=>e.classList.toggle("ativa", i<n));
}

/* 📡 enviar */
function enviar(){

  const dados = {
    chamado: document.getElementById("chamado").value,
    tecnico: document.getElementById("tecnico").value,
    data: document.getElementById("data").value,
    hora: document.getElementById("hora").value,
    nota: notaSelecionada,
    comentario: document.getElementById("comentario").value
  };

  if(!navigator.onLine){
    salvar(dados);
    mostrarToast("📴 Salvo offline");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(() => {
    mostrarToast("✔ Avaliação enviada com sucesso");
  })
  .catch(() => {
    salvar(dados);
    mostrarToast("⚠ Erro, salvo offline");
  });

}

/* 💾 offline */
function salvar(d){
  let lista = JSON.parse(localStorage.getItem("pend")) || [];

  // evita duplicar chamado igual
  const existe = lista.some(item => item.chamado === d.chamado);

  if(!existe){
    lista.push(d);
    localStorage.setItem("pend", JSON.stringify(lista));
  }

  carregarPendencias();
}
function carregarPendencias(){
  let lista = JSON.parse(localStorage.getItem("pend")) || [];

  const div = document.getElementById("listaPendencias");

  if(lista.length === 0){
    div.innerHTML = "<p style='text-align:center;color:#888'>Nenhuma pendência</p>";
    return;
  }

  div.innerHTML = lista.map((d,i)=>`
    <div class="item">
      📄 ${d.chamado} <br>
      👨‍🔧 ${d.tecnico} <br>
      📅 ${d.data} ⏰ ${d.hora}
    </div>
  `).join("");
}
/* 📡 pendências */
async function sincronizar(){

  let lista = JSON.parse(localStorage.getItem("pend")) || [];

  if(lista.length === 0){
    mostrarToast("Nada para sincronizar");
    return;
  }

  let novosRestantes = [];

  for(const d of lista){

    try{
      await fetch(API,{
        method: "POST",
        body: JSON.stringify(d)
      });

      // se enviou com sucesso → NÃO entra nos restantes
    }catch(e){
      // se falhou → mantém na lista
      novosRestantes.push(d);
    }
  }

  localStorage.setItem("pend", JSON.stringify(novosRestantes));

  carregarPendencias();

  mostrarToast("✔ Sincronização concluída");
}
  function mostrarToast(msg) {
  const toast = document.getElementById("toast");

  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}
</script>
<div id="toast" class="toast"></div>
</body>
</html>

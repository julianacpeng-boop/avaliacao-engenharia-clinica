<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teste Envio</title>
</head>
<body>

<h2>Teste Envio Planilha</h2>

<input id="chamado" placeholder="Chamado"><br><br>
<input id="tecnico" placeholder="Técnico"><br><br>
<input id="nota" placeholder="Nota"><br><br>
<input id="comentario" placeholder="Comentário"><br><br>

<button onclick="enviar()">Enviar</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyNR_4H8cYKJJ0KDd8nwq1GYIp0oKEFyj3EnOfgNiCWgz141zNyN4hUJHPR3iqTp16C/exec";

async function enviar() {

  const dados = {
    chamado: document.getElementById("chamado").value,
    tecnico: document.getElementById("tecnico").value,
    nota: document.getElementById("nota").value,
    comentario: document.getElementById("comentario").value
  };

  try {

    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify(dados)
    });

    const texto = await res.text();
    alert(texto);

  } catch (e) {
    alert("ERRO: " + e);
  }

}

</script>

</body>
</html>

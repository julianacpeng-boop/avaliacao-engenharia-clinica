<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Teste Avaliação Engenharia Clínica</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>

</head>

<body>

<div class="card">

  <h2>Teste de Avaliação</h2>

  <input id="chamado" placeholder="Número do chamado">
  <input id="tecnico" placeholder="Nome do técnico">
  <input id="nota" placeholder="Nota (0-5)">
  <input id="comentario" placeholder="Comentário">

  <button onclick="enviar()">Enviar</button>

</div>

<script>

function enviar() {

  const chamado = document.getElementById("chamado").value;
  const tecnico = document.getElementById("tecnico").value;
  const nota = document.getElementById("nota").value;
  const comentario = document.getElementById("comentario").value;

  const url =
    "https://script.google.com/macros/s/AKfycbyNR_4H8cYKJJ0KDd8nwq1GYIp0oKEFyj3EnOfgNiCWgz141zNyN4hUJHPR3iqTp16C/exec"
    + "?chamado=" + encodeURIComponent(chamado)
    + "&tecnico=" + encodeURIComponent(tecnico)
    + "&nota=" + encodeURIComponent(nota)
    + "&comentario=" + encodeURIComponent(comentario);

  // abre o Apps Script diretamente (SEM fetch)
  window.location.href = url;

}

</script>

</body>
</html>
